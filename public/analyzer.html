<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kortena AI — Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <img src="logo2.svg" alt="Kortena AI" style="height: 60px;">
      <a href="/">← Back to home</a>
    </div>

    <h1>Text Analyzer</h1>
    <p class="sub">Paste any text to analyze its sentiment and clarity.</p>

    <textarea id="inputText" placeholder="Paste your text here..."></textarea>
    <div class="word-count" id="wordCount">0 words</div>
    <button id="btn">Analyze</button>

    <div id="results">
      <div class="divider"></div>

      <div class="scores">
        <div class="score-card">
          <div class="value" id="sentiment_score">—</div>
          <div class="name">Sentiment</div>
        </div>
        <div class="score-card">
          <div class="clarity-ring">
            <svg viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="32" fill="none" stroke="#1a1a1a" stroke-width="6"/>
              <circle id="clarityCircle" cx="40" cy="40" r="32" fill="none" stroke="#4a90d9" stroke-width="6"
                stroke-dasharray="201" stroke-dashoffset="201" stroke-linecap="round"
                transform="rotate(-90 40 40)"/>
            </svg>
            <div class="ring-value" id="clarity_score">—</div>
          </div>
          <div class="name">Clarity</div>
        </div>
        <div class="score-card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <span class="sentiment-badge" id="sentiment_badge">—</span>
          <div class="name" style="margin-top:8px">Tone</div>
        </div>
      </div>

      <div class="section">
        <p class="section-label">Suggestions</p>
        <div id="tags" class="tags"></div>
      </div>

      <div class="section">
        <p class="section-label">Improvements</p>
        <ul id="suggestions"></ul>
      </div>

      <div class="section">
        <p class="section-label">Summary</p>
        <p class="summary-text" id="summary"></p>
      </div>

      <button id="copyBtn">Copy Results</button>
    </div>

    <div class="history-section" id="historySection" style="display:none;">
      <h3>Recent Analyses</h3>
      <div id="historyList"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
